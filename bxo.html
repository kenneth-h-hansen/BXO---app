function compressImage(dataUrl,maxW){
return new Promise((resolve,reject)=>{
try{
const img=new Image();
img.onload=()=>{
const scale=Math.min(1,(maxW||800)/img.width);
const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
const canvas=document.createElement("canvas");
canvas.width=w;canvas.height=h;
const ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",0.7));
};
img.onerror=()=>reject(new Error("img load failed"));
img.src=dataUrl;
}catch(e){reject(e);}
});
}

function platformUrl(p){
const homes={"finn":"https://www.finn.no","finn.no":"https://www.finn.no","facebook":"https://www.facebook.com/marketplace","facebook marketplace":"https://www.facebook.com/marketplace","marketplace":"https://www.facebook.com/marketplace","ebay":"https://www.ebay.com","vinted":"https://www.vinted.com","blocket":"https://www.blocket.se","dba":"https://www.dba.dk","tise":"https://tise.com","tori":"https://www.tori.fi"};
const key=(p.name||"").toLowerCase().trim();
if(homes[key])return homes[key];
const u=p.url||"";

}
async function aiAnalyzeImage(b64,mime,cats){
const catList=cats.map(c=>c.name).join(", ");
const text=await callClaude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:`Analyser bildet og returner KUN JSON: {"name":"kort navn","desc":"beskrivelse","category":"én av: ${catList}","room":"romtype","priority":"normal","items":["liste","av","ting"]}`}]}],`Du er en BXO-assistent. Returner KUN JSON, ingen annen tekst. All tekst i JSON skal være på dette språket: ${aiLang()}`);
return parseAIJson(text);
}
async function aiSmartSearch(query,boxes,cats){
const catById=id=>cats.find(c=>c.id===id)||{name:id};
const list=boxes.map(b=>`Eske ${b.num}: ${b.name} (${catById(b.catId).name}, ${b.room||"?"}) - ${b.desc||""}`).join("\n");
const text=await callClaude([{role:"user",content:`Søk: "${query}"\n\nEsker:\n${list}\n\nReturner KUN JSON-array med eskenumre som matcher, f.eks. ["1","3"]. Tom array hvis ingen.`}],"Du er BXO søkeassistent. Returner KUN JSON-array.",200);
return parseAIJson(text);
}
function QRImg({value,size}){
if(!value)return null;
const url="https://api.qrserver.com/v1/create-qr-code/?size="+size+"x"+size+"&data="+encodeURIComponent(value)+"&bgcolor=ffffff&color=1a1a18&qzone=1";
return html`<img src=${url} width=${size} height=${size} style=${{imageRendering:"pixelated",display:"block"}} alt="QR"/>`;
}

</div>
</button>`)}

${step===1&&html`

${step===2&&html`

<div style=${{display:"flex",gap:8,marginBottom:8}}>

${step===3&&html`

:html`

function App(){
const [user,setUser]=useState(undefined);
const [myData,setMyData]=useState(null);

const [page,setPage]=useState("boxes");
const [loading,setLoading]=useState(true);
const [syncing,setSyncing]=useState(false);
const [online,setOnline]=useState(navigator.onLine);
const [shareModal,setShareModal]=useState(false);
const [groupModal,setGroupModal]=useState(false);
const [scanModal,setScanModal]=useState(false);
const {msgs,show:toast}=useToast();
const saveRef=useRef(null);
const unsubRef=useRef(null);
const sharedUnsubRef=useRef(null);
const viewToken=new URLSearchParams(window.location.search).get("view");
const [onboarding,setOnboarding]=useState(null); 
const [householdId,setHouseholdId]=useState(null);
const [householdLoaded,setHouseholdLoaded]=useState(false);
useEffect(()=>{return _auth.onAuthStateChanged(u=>{
setUser(u);
if(!u){setMyData(null);setSharedData(null);setLoading(false);}
else{
try{
const ob=localStorage.getItem("bxo-onboarding");
setOnboarding(ob?false:"needed");
}catch{setOnboarding(false);}
}
});},[]);
useEffect(()=>{try{const p=localStorage.getItem("bxo-prefs");if(p)setPrefs(JSON.parse(p));}catch{}},[]);
useEffect(()=>{
if(!user){setHouseholdId(null);setHouseholdLoaded(false);return;}
setHouseholdLoaded(false);
const unsub=dbListen(uPath(user.uid,"householdId"),val=>{setHouseholdId(val||null);setHouseholdLoaded(true);});
return ()=>unsub();
},[user&&user.uid]);
useEffect(()=>{
if(!user)return;
if(!householdLoaded)return;
if(unsubRef.current)unsubRef.current();
if(sharedUnsubRef.current){sharedUnsubRef.current();sharedUnsubRef.current=null;}
setLoading(true);
unsubRef.current=dbListen(uPath(user.uid,"boxdata"),val=>{setMyData(val||DEFAULT_DATA);setLoading(false);});
if(householdId){
sharedUnsubRef.current=dbListen(`households/${householdId}/boxdata`,val=>{setSharedData(val||DEFAULT_DATA);});
}else{
setSharedData(null);
}
const t=setTimeout(()=>{setMyData(p=>p||DEFAULT_DATA);setLoading(false);},5000);
return()=>{if(unsubRef.current)unsubRef.current();if(sharedUnsubRef.current)sharedUnsubRef.current();clearTimeout(t);};
},[user&&user.uid,householdId,householdLoaded]);
const data=useMemo(()=>{
if(!myData&&!sharedData)return null;
return mergeData(myData,sharedData,!!householdId);
},[myData,sharedData,householdId]);
useEffect(()=>{
const on=()=>setOnline(true),off=()=>setOnline(false);
window.addEventListener("online",on);window.addEventListener("offline",off);
return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
},[]);
const persist=useCallback((next)=>{
if(!user)return;
setSyncing(true);
const parts=splitForSave(next);
setMyData(parts.my);
if(householdId)setSharedData(parts.shared);
clearTimeout(saveRef.current);
saveRef.current=setTimeout(()=>{
dbSet(uPath(user.uid,"boxdata"),parts.my);
if(householdId)dbSet(`households/${householdId}/boxdata`,parts.shared);
setTimeout(()=>setSyncing(false),800);
},500);
},[user&&user.uid,householdId]);
const persistPrefs=useCallback((next)=>{setPrefs(next);try{localStorage.setItem("bxo-prefs",JSON.stringify(next));}catch{};},[]);

const hid=randToken();
let startData=DEFAULT_DATA;
if(bringBoxes&&myData){
const myBoxes=(myData.boxes||[]).map(b=>{const{_shared,...rest}=b;return rest;});
startData={boxes:myBoxes,categories:myData.categories||DEFAULT_CATS,nextNum:myData.nextNum||1};
}
await dbSet(`households/${hid}`,{boxdata:startData,owner:user.uid,name:(groupName||"").trim()||t("hh_unnamed"),members:{[user.uid]:user.displayName||user.email||"Bruker"},created:Date.now()});
await dbSet(uPath(user.uid,"householdId"),hid);
return hid;
};
const joinHousehold=async(code)=>{
const clean=(code||"").trim().toLowerCase();
if(!clean)throw new Error(t("hh_err_empty"));
const hh=await dbGet(`households/${clean}`);
if(!hh)throw new Error(t("hh_err_notfound"));
await dbSet(`households/${clean}/members/${user.uid}`,user.displayName||user.email||"Bruker");
await dbSet(uPath(user.uid,"householdId"),clean);
};
const leaveHousehold=async()=>{
if(!householdId)return;
await dbRemove(`households/${householdId}/members/${user.uid}`);
await dbRemove(uPath(user.uid,"householdId"));
};

${syncing?html`<div style=${{width:12,height:12,border:"2px solid #333",borderTopColor:T.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>`:html`<div style=${{width:7,height:7,borderRadius:"50%",background:online?"#1e8449":"#e05535"}}/>`}

function PrinterLookup({s,upd,T,toast}){
const [query,setQuery]=useState(s.printerName||"");
const [looking,setLooking]=useState(false);
const [result,setResult]=useState(s.printerName?{name:s.printerName,dpi:s.customDpi,sizes:s.knownSizes||[]}:null);

const lookup=async()=>{
if(!query.trim()){toast("Skriv inn printermodell","error");return;}
setLooking(true);
try{
const sys="Du er ekspert på label-printere. Returner KUN gyldig JSON, ingen markdown.";
const prompt="Finn tekniske spesifikasjoner for denne label-printeren: "+query+". Returner KUN dette JSON-objektet (ingen markdown): {name:string,found:bool,dpi:number,type:string,connectivity:string,max_width_mm:number,sizes:[{w:number,h:number,name:string}],notes:string,app:string}. Hvis ikke funnet, sett found:false og gi beste gjetning.";
const res=await fetch(CLAUDE_API,{method:"POST",
headers:await authHeaders(),
body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,system:sys,messages:[{role:"user",content:prompt}]})
});
const data=await res.json();
if(data.error)throw new Error(data.error.message);

setResult(info);
if(info.sizes&&info.sizes[0]){
upd("customDpi",info.dpi||203);
upd("customW",info.sizes[0].w||50);
upd("customH",info.sizes[0].h||30);
upd("printerName",info.name);
upd("knownSizes",info.sizes);
}
toast(info.found?"✓ "+info.name+" funnet!":"Bruker beste estimat for "+query);
}catch(e){toast("Feil: "+e.message,"error");}
setLooking(false);
};

const files=Array.from(e.target.files);
files.forEach(file=>{
const r=new FileReader();
r.onload=ev=>setPhotos(p=>[...p,{
preview:ev.target.result,
b64:ev.target.result.split(",")[1],
mime:file.type,
name:file.name
}]);
r.readAsDataURL(file);
});
e.target.value="";
};
const removePhoto=i=>setPhotos(p=>p.filter((_,idx)=>idx!==i));
const analyze=async()=>{
if(photos.length===0){toast("Last opp minst ett bilde","error");return;}
setLoading(true);setSuggestions(null);
try{
const sys="Du er ekspert på effektiv pakking og flytteorganisering. Returner KUN gyldig JSON. All tekst i JSON (navn, tips, begrunnelser) skal være på dette språket: "+aiLang();
const imageContent=photos.map(p=>({type:"image",source:{type:"base64",media_type:p.mime,data:p.b64}}));
const prompt="Analyser gjenstander i bildene og foreslå esker. Returner KUN JSON: {\"room\":\"romnavn\",\"total_items\":0,\"boxes\":[{\"box_name\":\"navn\",\"priority\":\"now/normal/later/store\",\"room_destination\":\"rom\",\"estimated_size\":\"liten/medium/stor\",\"items\":[\"ting1\"],\"packing_tips\":\"tips\",\"reason\":\"grunn\"}],\"general_tips\":\"generelle tips\"}";
const res=await fetch(CLAUDE_API,{method:"POST",
headers:await authHeaders(),
body:JSON.stringify({
model:"claude-sonnet-4-6",
max_tokens:4096,
system:sys,
messages:[{role:"user",content:[...imageContent,{type:"text",text:prompt}]}]
})
});
const d=await res.json();
if(d.error)throw new Error(d.error.message);
const text=d.content.map(b=>b.text||"").join("");
const parsed=parseAIJson(text);
setSuggestions(parsed);
toast("AI foreslo "+(parsed.boxes?parsed.boxes.length:0)+" esker! 📦");
}catch(e){toast("Feil: "+e.message,"error");}
setLoading(false);
};

try{const img=ctx.getImageData(0,0,canvas.width,canvas.height);const code=jsQR(img.data,img.width,img.height);if(code&&code.data){handle(code.data);}}catch{}
